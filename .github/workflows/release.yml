name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-eng libtesseract-dev

      - name: Build and Package
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          APP_NAME="wfinfo-go"
          RELEASE_DIR="${APP_NAME}_${VERSION}_linux_amd64"

          mkdir -p "${RELEASE_DIR}/bin"

          GOOS=linux GOARCH=amd64 go build -v -o "${RELEASE_DIR}/bin/${APP_NAME}" ./cmd/${APP_NAME}

          cp README.md LICENSE "${RELEASE_DIR}/" 2>/dev/null || true

          tar -czvf "${RELEASE_DIR}.tar.gz" "${RELEASE_DIR}"

          sha256sum "${RELEASE_DIR}.tar.gz" > "${RELEASE_DIR}.tar.gz.sha256"

      - name: Generate Release Notes
        run: |
          npx conventional-changelog-cli -p angular -r 2 > RELEASE_NOTES.md

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tar.gz
            *.tar.gz.sha256
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
